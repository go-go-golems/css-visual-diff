metadata:
  slug: pyxis-prototype-vs-app
  title: Pyxis shows page — prepared prototype vs current React app
  description: Compare the clean direct-rendered Pyxis prototype against the current pyxis-user-site built app.

original:
  name: pyxis-prototype
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport:
    width: 1200
    height: 2200
  prepare:
    type: direct-react-global
    wait_for: "window.React && window.ReactDOM && window.PPXDesktop"
    wait_for_timeout_ms: 30000
    component: PPXDesktop
    props:
      page: shows
    root_selector: "#capture-root"
    width: 920
    background: "#fff"
    after_wait_ms: 1000

react:
  name: pyxis-user-site
  url: http://localhost:8790/
  wait_ms: 2500
  viewport:
    width: 1200
    height: 2200
  root_selector: "#root"

sections:
  - name: full
    selector_original: "#capture-root"
    selector_react: "#root"
    expect_text_original:
      includes: ["ppxis", "Upcoming shows", "Instagram"]
      excludes: ["01 · Desktop", "Poster-grid shell"]
    expect_text_react:
      includes: ["Shows"]
    expect_png_original:
      width: 920
      min_height: 1700
      top_strip_near:
        rgb: [255, 255, 255]
        tolerance: 8
      top_strip_not_near:
        rgb: [240, 238, 233]
        tolerance: 8
    expect_png_react:
      min_width: 900
      min_height: 500

  - name: header
    selector_original: "#capture-root header"
    selector_react: "#root header"
    expect_png_original:
      width: 920
      min_height: 40
    expect_png_react:
      min_width: 900
      min_height: 40

  - name: nav
    selector_original: "#capture-root nav"
    selector_react: "#root header nav"

  - name: main
    selector_original: "#capture-root main"
    selector_react: "#root main"
    expect_text_original:
      includes: ["Upcoming shows"]
    expect_text_react:
      includes: ["Upcoming"]

  - name: footer
    selector_original: "#capture-root footer"
    selector_react: "#root footer"
    expect_png_original:
      width: 920
      min_height: 80
    expect_png_react:
      min_width: 900
      min_height: 40

styles:
  - name: header
    selector_original: "#capture-root header"
    selector_react: "#root header"
    include_bounds: true
    report: [box_model]
    props:
      - height
      - padding
      - background-color
      - border-bottom-color
      - font-family
      - font-size

  - name: page-title
    selector_original: "#capture-root h1"
    selector_react: "#root main h2"
    include_bounds: true
    report: [box_model]
    props:
      - font-family
      - font-size
      - font-weight
      - line-height
      - color
      - margin

  - name: full-root
    selector_original: "#capture-root"
    selector_react: "#root"
    include_bounds: true
    report: [box_model]
    props:
      - width
      - background-color
      - color
      - font-family

output:
  dir: ./out/pyxis-prototype-vs-app
  write_json: true
  write_markdown: true
  write_pngs: true
  write_prepared_html: true
  write_inspect_json: true
  validate_pngs: true

modes:
  - capture
  - cssdiff
  - matched-styles
  - pixeldiff
  - html-report
