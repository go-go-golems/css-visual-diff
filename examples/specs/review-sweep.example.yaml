# Example review-sweep spec for css-visual-diff
#
# Usage:
#   css-visual-diff verbs --repository examples/verbs \
#     examples review-sweep from-spec \
#     --spec-file examples/specs/review-sweep.example.yaml \
#     --out-dir /tmp/example-review
#
#   css-visual-diff serve --data-dir /tmp/example-review --port 8098

name: example-visual-sweep
variant: desktop

viewport:
  width: 920
  height: 1460

defaults:
  waitMs: 1000
  threshold: 30

policy:
  bands:
    - name: accepted
      maxChangedPercent: 0.5
    - name: review
      maxChangedPercent: 10
    - name: tune-required
      maxChangedPercent: 30
    - name: major-mismatch
      maxChangedPercent: 100

