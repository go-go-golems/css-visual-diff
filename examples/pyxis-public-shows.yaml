metadata:
  slug: pyxis-public-shows
  title: Pyxis public shows page — prototype vs Storybook
  description: Compare a clean direct-rendered Pyxis prototype baseline with a Storybook React port.

original:
  name: pyxis-prototype
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport:
    width: 1200
    height: 2200
  prepare:
    type: direct-react-global
    wait_for: "window.React && window.ReactDOM && window.PPXDesktop"
    wait_for_timeout_ms: 30000
    component: PPXDesktop
    props:
      page: shows
    root_selector: "#capture-root"
    width: 920
    background: "#fff"
    after_wait_ms: 1000

react:
  name: pyxis-storybook
  url: http://localhost:6006/iframe.html?id=pages-shows--prototype-width
  wait_ms: 1000
  viewport:
    width: 1200
    height: 2200
  root_selector: "[data-page='shows']"

sections:
  - name: full
    selector_original: "#capture-root"
    selector_react: "[data-page='shows']"
    expect_text_original:
      includes: ["ppxis", "Upcoming shows", "Instagram"]
      excludes: ["01 · Desktop", "Poster-grid shell"]
    expect_png_original:
      width: 920
      min_height: 1700
      top_strip_near:
        rgb: [255, 255, 255]
        tolerance: 8
      top_strip_not_near:
        rgb: [240, 238, 233]
        tolerance: 8

  - name: header
    selector_original: "#capture-root header"
    selector_react: "[data-region='site-header']"
    expect_png_original:
      width: 920
      min_height: 40

  - name: nav
    selector_original: "#capture-root nav"
    selector_react: "[data-region='site-nav']"

  - name: main
    selector_original: "#capture-root main"
    selector_react: "[data-region='site-main']"
    expect_text_original:
      includes: ["Upcoming shows"]
      excludes: ["Poster-grid shell"]

  - name: footer
    selector_original: "#capture-root footer"
    selector_react: "[data-region='site-footer']"
    expect_text_original:
      includes: ["Instagram"]
    expect_png_original:
      width: 920
      min_height: 80

styles:
  - name: header
    selector_original: "#capture-root header"
    selector_react: "[data-region='site-header']"
    include_bounds: true
    props:
      - height
      - padding
      - background-color
      - border-bottom-color
      - font-family
      - font-size

  - name: page-title
    selector_original: "#capture-root h1"
    selector_react: "[data-page='shows'] h1"
    include_bounds: true
    props:
      - font-family
      - font-size
      - font-weight
      - line-height
      - color
      - margin

output:
  dir: ./out/pyxis-public-shows
  write_json: true
  write_markdown: true
  write_pngs: true
  write_prepared_html: true
  write_inspect_json: true
  validate_pngs: true

modes:
  - capture
  - cssdiff
  - matched-styles
  - pixeldiff
