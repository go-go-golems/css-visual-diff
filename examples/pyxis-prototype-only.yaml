metadata:
  slug: pyxis-prototype-only
  title: Pyxis prototype-only direct render inspection
  description: Capture and browse the prepared Pyxis prototype without comparing to Storybook.

original:
  name: pyxis-prototype
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport:
    width: 1200
    height: 2200
  prepare:
    type: direct-react-global
    wait_for: "window.React && window.ReactDOM && window.PPXDesktop"
    wait_for_timeout_ms: 30000
    component: PPXDesktop
    props:
      page: shows
    root_selector: "#capture-root"
    width: 920
    background: "#fff"
    after_wait_ms: 1000

# Prototype-only inspection currently mirrors original into react because the tool's
# config schema is comparison-shaped. Run only capture,html-report for this file.
react:
  name: pyxis-prototype-mirror
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport:
    width: 1200
    height: 2200
  prepare:
    type: direct-react-global
    wait_for: "window.React && window.ReactDOM && window.PPXDesktop"
    wait_for_timeout_ms: 30000
    component: PPXDesktop
    props:
      page: shows
    root_selector: "#capture-root"
    width: 920
    background: "#fff"
    after_wait_ms: 1000

sections:
  - name: full
    selector: "#capture-root"
    expect_text:
      includes: ["ppxis", "Upcoming shows", "Instagram"]
      excludes: ["01 · Desktop", "Poster-grid shell"]
    expect_png:
      width: 920
      min_height: 1700
      top_strip_near:
        rgb: [255, 255, 255]
        tolerance: 8
      top_strip_not_near:
        rgb: [240, 238, 233]
        tolerance: 8

  - name: header
    selector: "#capture-root header"
    expect_png:
      width: 920
      min_height: 40

  - name: nav
    selector: "#capture-root nav"

  - name: main
    selector: "#capture-root main"
    expect_text:
      includes: ["Upcoming shows"]
      excludes: ["Poster-grid shell"]

  - name: footer
    selector: "#capture-root footer"
    expect_text:
      includes: ["Instagram"]
    expect_png:
      width: 920
      min_height: 80

styles:
  - name: header
    selector: "#capture-root header"
    include_bounds: true
    props:
      - height
      - padding
      - background-color
      - border-bottom-color
      - font-family
      - font-size

  - name: page-title
    selector: "#capture-root h1"
    include_bounds: true
    props:
      - font-family
      - font-size
      - font-weight
      - line-height
      - color
      - margin

output:
  dir: ./out/pyxis-prototype-only
  write_json: true
  write_markdown: true
  write_pngs: true
  write_prepared_html: true
  write_inspect_json: true
  validate_pngs: true

modes:
  - capture
  - html-report
